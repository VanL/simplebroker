name: Release simplebroker-redis

on:
  push:
    tags:
      - "simplebroker_redis/v*"

permissions:
  contents: write
  actions: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        exclude:
          # macOS runners are expensive, so only test on latest Python
          - os: macos-latest
            python-version: "3.10"
          - os: macos-latest
            python-version: "3.11"
          - os: macos-latest
            python-version: "3.12"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
            extensions/simplebroker_redis/pyproject.toml
            extensions/simplebroker_redis/uv.lock

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"

      - name: Run tests with pytest
        run: |
          pytest -v --tb=short -m "not slow" --override-ini="addopts=-ra -q --strict-markers -n auto --dist loadgroup"

      - name: Test CLI installation
        run: |
          broker --version
          simplebroker --version

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
            extensions/simplebroker_redis/pyproject.toml
            extensions/simplebroker_redis/uv.lock

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"

      - name: Run linting with ruff
        run: |
          ruff check simplebroker tests bin extensions/simplebroker_redis/simplebroker_redis extensions/simplebroker_redis/tests

      - name: Check formatting with ruff
        run: |
          ruff format --check simplebroker tests bin extensions/simplebroker_redis/simplebroker_redis extensions/simplebroker_redis/tests

      - name: Type check with mypy
        run: |
          mypy simplebroker bin/release.py extensions/simplebroker_redis/simplebroker_redis extensions/simplebroker_redis/tests --config-file pyproject.toml

  packaging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
            extensions/simplebroker_redis/pyproject.toml
            extensions/simplebroker_redis/uv.lock

      - name: Install build tools
        run: |
          python -m pip install build

      - name: Run packaging smoke
        run: |
          uv run ./bin/packaging-smoke --python 3.10

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
            extensions/simplebroker_redis/pyproject.toml
            extensions/simplebroker_redis/uv.lock

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"

      - name: Run tests with coverage
        env:
          PYTEST_ADDOPTS: -ra -q --strict-markers -n auto --dist loadgroup
          COVERAGE_PROCESS_START: ${{ github.workspace }}/pyproject.toml
          COVERAGE_FILE: ${{ github.workspace }}/.coverage
        run: |
          uv run pytest --cov=simplebroker --cov-report=term-missing --cov-report=xml -m "not slow"

  test-redis:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
            extensions/simplebroker_redis/pyproject.toml
            extensions/simplebroker_redis/uv.lock

      - name: Run Redis-backed test suites
        run: |
          uv run ./bin/pytest-redis

  release:
    needs: [test, lint, packaging, coverage, test-redis]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.13"

      - name: Require all test workflows to be green
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python .github/scripts/require_green_workflows.py \
            --workflow "Test" \
            --workflow "Test Redis Extension"

      - name: Install build tools
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build extensions/simplebroker_redis

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#simplebroker_redis/}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          name: "simplebroker-redis ${{ steps.version.outputs.version }}"
          files: extensions/simplebroker_redis/dist/*
          generate_release_notes: true
