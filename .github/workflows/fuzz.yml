name: Fuzz

# Weekly coverage-guided fuzzing of the parser surfaces via Atheris, driving
# the existing Hypothesis properties through their external-fuzzer hook
# (see fuzz/*.py). Crashes are real property violations: the failing example
# lands in the Hypothesis database artifact and replays with plain pytest.

on:
  schedule:
    - cron: "17 3 * * 1" # Mondays 03:17 UTC
  workflow_dispatch:

permissions:
  contents: read

env:
  UV_VERSION: "0.11.28"

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        harness: [timestamp_validate, dump_load]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          # Pinned below latest: Atheris wheels lag the newest CPython.
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install
        run: uv sync --frozen --extra dev --group fuzz

      - name: Restore corpus
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: fuzz/corpus/${{ matrix.harness }}
          # Per-run key + prefix restore: each run saves an evolved corpus,
          # the next run restores the most recent one.
          key: fuzz-corpus-${{ matrix.harness }}-${{ github.run_id }}
          restore-keys: |
            fuzz-corpus-${{ matrix.harness }}-

      - name: Fuzz (15 minutes)
        run: |
          mkdir -p fuzz/corpus/${{ matrix.harness }}
          uv run --frozen --no-sync python fuzz/fuzz_${{ matrix.harness }}.py \
            fuzz/corpus/${{ matrix.harness }} \
            -max_total_time=900 -print_final_stats=1

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-failure-${{ matrix.harness }}
          path: |
            crash-*
            .hypothesis/
          if-no-files-found: ignore
