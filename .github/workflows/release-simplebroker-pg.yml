name: Release simplebroker-pg

on:
  push:
    tags:
      - "simplebroker_pg/v*"

permissions:
  contents: write
  actions: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.13"

      - name: Require all test workflows to be green
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python .github/scripts/require_green_workflows.py \
            --workflow "Test" \
            --workflow "Test Postgres Extension"

      - name: Install build tools
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build extensions/simplebroker_pg

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#simplebroker_pg/}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          name: "simplebroker-pg ${{ steps.version.outputs.version }}"
          files: extensions/simplebroker_pg/dist/*
          generate_release_notes: true
