name: Release Gate (simplebroker-pg)

on:
  push:
    tags:
      - "simplebroker_pg/v*"

permissions:
  contents: read
  actions: read

concurrency:
  group: release-gate-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_VERSION: "0.11.11"
  PACKAGE_NAME: simplebroker-pg
  PACKAGE_DIR: extensions/simplebroker_pg

jobs:
  extract-version:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      release_name: ${{ steps.release.outputs.name }}
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#simplebroker_pg/}" >> "$GITHUB_OUTPUT"

      - name: Compute GitHub release name
        id: release
        run: echo "name=simplebroker-pg ${{ steps.version.outputs.version }}" >> "$GITHUB_OUTPUT"

  require-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 130
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Require all test workflows to be green
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python .github/scripts/require_green_workflows.py \
            --workflow "Test" \
            --workflow "Test Postgres Extension"

  verify-tag-current:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    needs:
      - extract-version
      - require-tests
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify tag still points at tested commit
        env:
          EXPECTED_SHA: ${{ github.sha }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          remote_sha="$(git ls-remote --tags origin "refs/tags/${TAG_NAME}" "refs/tags/${TAG_NAME}^{}" | awk 'NR==1 { sha=$1 } END { print $1 ? $1 : sha }')"
          if [ -z "${remote_sha}" ]; then
            echo "Tag ${TAG_NAME} no longer exists on origin"
            exit 1
          fi
          if [ "${remote_sha}" != "${EXPECTED_SHA}" ]; then
            echo "Tag ${TAG_NAME} moved while the release gate was running"
            echo "expected: ${EXPECTED_SHA}"
            echo "actual:   ${remote_sha}"
            exit 1
          fi

  build:
    needs:
      - extract-version
      - require-tests
      - verify-tag-current
    runs-on: ubuntu-latest
    timeout-minutes: 50
    permissions:
      attestations: write
      artifact-metadata: write
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Verify checked out commit matches tested release commit
        run: |
          test "$(git rev-parse HEAD)" = "${{ github.sha }}"

      - name: Build package
        working-directory: ${{ env.PACKAGE_DIR }}
        run: |
          uv build

      - name: Generate artifact attestation
        id: attest
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: ${{ env.PACKAGE_DIR }}/dist/*

      - name: Stage attestation bundle
        env:
          BUNDLE_PATH: ${{ steps.attest.outputs.bundle-path }}
          PACKAGE_NAME: ${{ env.PACKAGE_NAME }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p attestations
          safe_tag="$(printf '%s' "${TAG_NAME}" | tr '/:' '--')"
          cp "${BUNDLE_PATH}" "attestations/${PACKAGE_NAME}-${safe_tag}.sigstore.json"

      - name: Store the distribution packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.PACKAGE_NAME }}-python-package-distributions
          path: ${{ env.PACKAGE_DIR }}/dist/

      - name: Store the attestation bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.PACKAGE_NAME }}-attestations
          path: attestations/*.sigstore.json

  publish-to-pypi:
    name: Publish to PyPI
    needs:
      - build
    runs-on: ubuntu-latest
    timeout-minutes: 50
    environment:
      name: pypi
      url: https://pypi.org/p/simplebroker-pg
    permissions:
      id-token: write

    steps:
      - name: Download all the dists
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.PACKAGE_NAME }}-python-package-distributions
          path: dist/

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

  github-release:
    name: Upload to GitHub Release
    needs:
      - extract-version
      - publish-to-pypi
    runs-on: ubuntu-latest
    timeout-minutes: 50
    permissions:
      actions: read
      contents: write

    steps:
      - name: Download all the dists
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.PACKAGE_NAME }}-python-package-distributions
          path: dist/

      - name: Download attestation bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.PACKAGE_NAME }}-attestations
          path: attestations/

      - name: Create GitHub Release and upload artifacts
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          name: ${{ needs.extract-version.outputs.release_name }}
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}
          files: |
            dist/*.tar.gz
            dist/*.whl
            attestations/*.sigstore.json
