name: Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

env:
  UV_VERSION: "0.11.28"

jobs:
  locks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      with:
        python-version: "3.12"

    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
      with:
        version: ${{ env.UV_VERSION }}
        enable-cache: true
        cache-dependency-glob: |
          pyproject.toml
          uv.lock
          extensions/simplebroker_pg/pyproject.toml
          extensions/simplebroker_pg/uv.lock
          extensions/simplebroker_redis/pyproject.toml
          extensions/simplebroker_redis/uv.lock

    - name: Check uv policy and lockfiles
      run: python bin/bump_uv.py --check

  test:
    runs-on: ${{ matrix.os }}
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
        exclude:
          # macOS runners are expensive, so only test on latest Python
          - os: macos-latest
            python-version: "3.11"
          - os: macos-latest
            python-version: "3.12"

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

    - name: Set up Python ${{ matrix.python-version }}
      id: matrix-python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
      with:
        version: ${{ env.UV_VERSION }}
        enable-cache: true
        cache-dependency-glob: |
          pyproject.toml
          uv.lock
          extensions/simplebroker_pg/pyproject.toml
          extensions/simplebroker_pg/uv.lock
          extensions/simplebroker_redis/pyproject.toml
          extensions/simplebroker_redis/uv.lock

    - name: Install dependencies
      run: |
        uv sync --frozen --extra dev --python "${{ steps.matrix-python.outputs.python-path }}"

    - name: Verify matrix Python
      run: |
        uv run --frozen --no-sync python -c "import sys; expected = tuple(map(int, '${{ matrix.python-version }}'.split('.'))); assert sys.version_info[:2] == expected, (sys.version, expected)"

    - name: Run tests with pytest
      if: matrix.os != 'windows-latest' || matrix.python-version != '3.14'
      run: |
        uv run --frozen --no-sync pytest -v --tb=short -m "not benchmark" --override-ini="addopts=-ra -q --strict-markers -n auto --dist loadgroup"

    - name: Run Windows tests with coverage
      if: matrix.os == 'windows-latest' && matrix.python-version == '3.14'
      env:
        COVERAGE_PROCESS_START: ${{ github.workspace }}/pyproject.toml
        COVERAGE_FILE: ${{ github.workspace }}/.coverage
      run: |
        uv run --frozen --no-sync coverage erase
        uv run --frozen --no-sync pytest -v --tb=short -m "not benchmark" --override-ini="addopts=-ra -q --strict-markers -n auto --dist loadgroup" --cov=simplebroker --cov=extensions/simplebroker_pg/simplebroker_pg --cov=extensions/simplebroker_redis/simplebroker_redis --cov-report= --cov-fail-under=0

    - name: Run phaselock fallback-path gate
      if: matrix.os != 'windows-latest' || matrix.python-version != '3.14'
      env:
        PHASELOCK_ENABLE_XATTRS: "0"
      run: |
        uv run --frozen --no-sync pytest -v --tb=short -m "not benchmark" --override-ini="addopts=-ra -q --strict-markers -n auto --dist loadgroup" tests/test_phaselock.py tests/test_runner_validation.py tests/test_runner_error_handling.py tests/test_queue_config_defaults.py tests/test_sqlite_setup_contention.py

    - name: Run Windows phaselock fallback-path gate with coverage
      if: matrix.os == 'windows-latest' && matrix.python-version == '3.14'
      env:
        PHASELOCK_ENABLE_XATTRS: "0"
        COVERAGE_PROCESS_START: ${{ github.workspace }}/pyproject.toml
        COVERAGE_FILE: ${{ github.workspace }}/.coverage
      run: |
        uv run --frozen --no-sync pytest -v --tb=short -m "not benchmark" --override-ini="addopts=-ra -q --strict-markers -n auto --dist loadgroup" --cov=simplebroker --cov=extensions/simplebroker_pg/simplebroker_pg --cov=extensions/simplebroker_redis/simplebroker_redis --cov-append --cov-report= --cov-fail-under=0 tests/test_phaselock.py tests/test_runner_validation.py tests/test_runner_error_handling.py tests/test_queue_config_defaults.py tests/test_sqlite_setup_contention.py

    - name: Test CLI installation
      run: |
        uv run --frozen --no-sync broker --version
        uv run --frozen --no-sync simplebroker --version

    - name: Prepare Windows coverage data
      if: matrix.os == 'windows-latest' && matrix.python-version == '3.14'
      env:
        COVERAGE_FILE: ${{ github.workspace }}/.coverage
      run: |
        uv run --frozen --no-sync python .github/scripts/combine_coverage.py
        uv run --frozen --no-sync python -c "from pathlib import Path; Path('.coverage').replace('.coverage.windows')"

    - name: Upload Windows coverage data
      if: matrix.os == 'windows-latest' && matrix.python-version == '3.14'
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: coverage-windows
        path: .coverage.windows
        include-hidden-files: true
        if-no-files-found: error

  lint:
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.12"
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

    - name: Set up Python
      id: sync-python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      with:
        python-version: "3.12"

    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
      with:
        version: ${{ env.UV_VERSION }}
        enable-cache: true
        cache-dependency-glob: |
          pyproject.toml
          uv.lock
          extensions/simplebroker_pg/pyproject.toml
          extensions/simplebroker_pg/uv.lock
          extensions/simplebroker_redis/pyproject.toml
          extensions/simplebroker_redis/uv.lock

    - name: Install dependencies
      run: |
        uv sync --frozen --extra dev --extra pg --extra redis --python "${{ steps.sync-python.outputs.python-path }}"

    - name: Test Python examples
      run: uv run --frozen --no-sync pytest -n auto examples

    - name: Type check Python examples
      run: uv run --frozen --no-sync python bin/release.py --check-example-types

    - name: Run linting with ruff
      run: |
        uv run --frozen --no-sync ruff check simplebroker tests bin .github/scripts extensions/simplebroker_pg/simplebroker_pg extensions/simplebroker_pg/tests extensions/simplebroker_redis/simplebroker_redis extensions/simplebroker_redis/tests

    - name: Check formatting with ruff
      run: |
        uv run --frozen --no-sync ruff format --check simplebroker tests bin .github/scripts extensions/simplebroker_pg/simplebroker_pg extensions/simplebroker_pg/tests extensions/simplebroker_redis/simplebroker_redis extensions/simplebroker_redis/tests

    - name: Type check with mypy
      run: |
        mapfile -t pg_test_files < <(find extensions/simplebroker_pg/tests -type f -name '*.py' -not -path '*/__pycache__/*' | sort)
        mapfile -t redis_test_files < <(find extensions/simplebroker_redis/tests -type f -name '*.py' -not -path '*/__pycache__/*' | sort)
        uv run --frozen --no-sync mypy simplebroker bin/release.py extensions/simplebroker_pg/simplebroker_pg extensions/simplebroker_redis/simplebroker_redis --config-file pyproject.toml
        uv run --frozen --no-sync mypy extensions/simplebroker_pg/simplebroker_pg "${pg_test_files[@]}" --config-file pyproject.toml
        uv run --frozen --no-sync mypy extensions/simplebroker_redis/simplebroker_redis "${redis_test_files[@]}" --config-file pyproject.toml

  packaging:
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.11"
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

    - name: Set up Python
      id: sync-python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      with:
        python-version: "3.11"

    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
      with:
        version: ${{ env.UV_VERSION }}
        enable-cache: true
        cache-dependency-glob: |
          pyproject.toml
          uv.lock
          extensions/simplebroker_pg/pyproject.toml
          extensions/simplebroker_pg/uv.lock
          extensions/simplebroker_redis/pyproject.toml
          extensions/simplebroker_redis/uv.lock

    - name: Run packaging smoke
      run: |
        uv sync --frozen --extra dev --python "${{ steps.sync-python.outputs.python-path }}"
        uv run --frozen --no-sync ./bin/packaging-smoke --python 3.11

  coverage:
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.12"
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

    - name: Set up Python
      id: sync-python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      with:
        python-version: "3.12"

    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
      with:
        version: ${{ env.UV_VERSION }}
        enable-cache: true
        cache-dependency-glob: |
          pyproject.toml
          uv.lock
          extensions/simplebroker_pg/pyproject.toml
          extensions/simplebroker_pg/uv.lock
          extensions/simplebroker_redis/pyproject.toml
          extensions/simplebroker_redis/uv.lock

    - name: Install dependencies
      run: |
        uv sync --frozen --extra dev --extra pg --extra redis --python "${{ steps.sync-python.outputs.python-path }}"

    - name: Run tests with coverage
      env:
        PYTEST_ADDOPTS: -ra -q --strict-markers -n auto --dist loadgroup
        COVERAGE_PROCESS_START: ${{ github.workspace }}/pyproject.toml
        COVERAGE_FILE: ${{ github.workspace }}/.coverage
      run: |
        uv run --frozen --no-sync coverage erase
        uv run --frozen --no-sync pytest --cov=simplebroker --cov=extensions/simplebroker_pg/simplebroker_pg --cov=extensions/simplebroker_redis/simplebroker_redis --cov-append --cov-report= --cov-fail-under=0 -m "not benchmark"
        PYTEST_ADDOPTS= uv run --frozen --no-sync ./bin/pytest-pg --fast --cov=simplebroker --cov=extensions/simplebroker_pg/simplebroker_pg --cov=extensions/simplebroker_redis/simplebroker_redis --cov-append --cov-report= --cov-fail-under=0
        PYTEST_ADDOPTS= uv run --frozen --no-sync ./bin/pytest-redis --fast --cov=simplebroker --cov=extensions/simplebroker_pg/simplebroker_pg --cov=extensions/simplebroker_redis/simplebroker_redis --cov-append --cov-report= --cov-fail-under=0
        uv run --frozen --no-sync python .github/scripts/combine_coverage.py
        uv run --frozen --no-sync python -c "from pathlib import Path; Path('.coverage').replace('.coverage.linux')"

    - name: Upload Linux coverage data
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: coverage-linux
        path: .coverage.linux
        include-hidden-files: true
        if-no-files-found: error

  coverage-report:
    needs: [test, coverage]
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.12"
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

    - name: Set up Python
      id: sync-python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      with:
        python-version: "3.12"

    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
      with:
        version: ${{ env.UV_VERSION }}
        enable-cache: true
        cache-dependency-glob: |
          pyproject.toml
          uv.lock

    - name: Install dependencies
      run: |
        uv sync --frozen --extra dev --python "${{ steps.sync-python.outputs.python-path }}"

    - name: Download coverage data
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        pattern: coverage-*
        path: .
        merge-multiple: true

    - name: Combine and enforce coverage
      env:
        COVERAGE_FILE: ${{ github.workspace }}/.coverage
      run: |
        uv run --frozen --no-sync python -c "from pathlib import Path; expected = (Path('.coverage.linux'), Path('.coverage.windows')); missing = [str(path) for path in expected if not path.is_file()]; assert not missing, f'missing coverage data: {missing}'"
        uv run --frozen --no-sync python .github/scripts/combine_coverage.py
        uv run --frozen --no-sync coverage report --show-missing
        uv run --frozen --no-sync coverage xml

    - name: Upload coverage reports
      id: codecov
      continue-on-error: true
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: true
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: VanL/simplebroker

    - name: Warn if Codecov upload failed
      if: steps.codecov.outcome == 'failure'
      run: echo "::warning::Codecov upload failed; local coverage gate passed"
