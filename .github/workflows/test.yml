name: Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
        exclude:
          # macOS runners are expensive, so only test on latest Python
          - os: macos-latest
            python-version: "3.11"
          - os: macos-latest
            python-version: "3.12"

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
      with:
        enable-cache: true
        cache-dependency-glob: |
          pyproject.toml
          uv.lock
          extensions/simplebroker_pg/pyproject.toml
          extensions/simplebroker_pg/uv.lock
          extensions/simplebroker_redis/pyproject.toml
          extensions/simplebroker_redis/uv.lock

    - name: Install dependencies
      run: |
        uv pip install --system -e ".[dev]"

    - name: Run tests with pytest
      run: |
        pytest -v --tb=short -m "not slow" --override-ini="addopts=-ra -q --strict-markers -n auto --dist loadgroup"

    - name: Run phaselock fallback-path gate
      env:
        _ENABLE_PHASELOCK_XATTRS: "0"
      run: |
        pytest -v --tb=short -m "not slow" --override-ini="addopts=-ra -q --strict-markers -n auto --dist loadgroup" tests/test_phaselock.py tests/test_runner_validation.py tests/test_runner_error_handling.py tests/test_queue_config_defaults.py tests/test_sqlite_setup_contention.py

    - name: Test CLI installation
      run: |
        broker --version
        simplebroker --version

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      with:
        python-version: "3.12"

    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
      with:
        enable-cache: true
        cache-dependency-glob: |
          pyproject.toml
          uv.lock
          extensions/simplebroker_pg/pyproject.toml
          extensions/simplebroker_pg/uv.lock
          extensions/simplebroker_redis/pyproject.toml
          extensions/simplebroker_redis/uv.lock

    - name: Install dependencies
      run: |
        uv pip install --system -e ".[dev]"

    - name: Run linting with ruff
      run: |
        ruff check simplebroker tests bin extensions/simplebroker_pg/simplebroker_pg extensions/simplebroker_pg/tests extensions/simplebroker_redis/simplebroker_redis extensions/simplebroker_redis/tests

    - name: Check formatting with ruff
      run: |
        ruff format --check simplebroker tests bin extensions/simplebroker_pg/simplebroker_pg extensions/simplebroker_pg/tests extensions/simplebroker_redis/simplebroker_redis extensions/simplebroker_redis/tests

    - name: Type check with mypy
      run: |
        mypy simplebroker bin/release.py extensions/simplebroker_pg/simplebroker_pg extensions/simplebroker_redis/simplebroker_redis extensions/simplebroker_redis/tests --config-file pyproject.toml

  packaging:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      with:
        python-version: "3.11"

    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
      with:
        enable-cache: true
        cache-dependency-glob: |
          pyproject.toml
          uv.lock
          extensions/simplebroker_pg/pyproject.toml
          extensions/simplebroker_pg/uv.lock
          extensions/simplebroker_redis/pyproject.toml
          extensions/simplebroker_redis/uv.lock

    - name: Install build tools
      run: |
        python -m pip install build

    - name: Run packaging smoke
      run: |
        uv run ./bin/packaging-smoke --python 3.11

  coverage:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      with:
        python-version: "3.12"

    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
      with:
        enable-cache: true
        cache-dependency-glob: |
          pyproject.toml
          uv.lock
          extensions/simplebroker_pg/pyproject.toml
          extensions/simplebroker_pg/uv.lock
          extensions/simplebroker_redis/pyproject.toml
          extensions/simplebroker_redis/uv.lock

    - name: Install dependencies
      run: |
        uv pip install --system -e ".[dev]"

    - name: Run tests with coverage
      env:
        PYTEST_ADDOPTS: -ra -q --strict-markers -n auto --dist loadgroup
        COVERAGE_PROCESS_START: ${{ github.workspace }}/pyproject.toml
        COVERAGE_FILE: ${{ github.workspace }}/.coverage
      run: |
        uv run pytest --cov=simplebroker --cov-report=term-missing --cov-report=xml -m "not slow"

    - name: Upload coverage reports
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: VanL/simplebroker
