name: Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        exclude:
          # macOS runners are expensive, so only test on latest Python
          - os: macos-latest
            python-version: "3.10"
          - os: macos-latest
            python-version: "3.11"
          - os: macos-latest
            python-version: "3.12"

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
      with:
        enable-cache: true
        cache-dependency-glob: |
          pyproject.toml
          uv.lock
          extensions/simplebroker_pg/pyproject.toml
          extensions/simplebroker_pg/uv.lock
          extensions/simplebroker_redis/pyproject.toml
          extensions/simplebroker_redis/uv.lock

    - name: Install dependencies
      run: |
        uv pip install --system -e ".[dev]"

    - name: Run tests with pytest
      run: |
        pytest -v --tb=short -m "not slow" --override-ini="addopts=-ra -q --strict-markers -n auto --dist loadgroup"

    - name: Test CLI installation
      run: |
        broker --version
        simplebroker --version

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
      with:
        python-version: "3.12"

    - name: Install uv
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
      with:
        enable-cache: true
        cache-dependency-glob: |
          pyproject.toml
          uv.lock
          extensions/simplebroker_pg/pyproject.toml
          extensions/simplebroker_pg/uv.lock
          extensions/simplebroker_redis/pyproject.toml
          extensions/simplebroker_redis/uv.lock

    - name: Install dependencies
      run: |
        uv pip install --system -e ".[dev]"

    - name: Run linting with ruff
      run: |
        ruff check simplebroker tests bin extensions/simplebroker_pg/simplebroker_pg extensions/simplebroker_pg/tests extensions/simplebroker_redis/simplebroker_redis extensions/simplebroker_redis/tests

    - name: Check formatting with ruff
      run: |
        ruff format --check simplebroker tests bin extensions/simplebroker_pg/simplebroker_pg extensions/simplebroker_pg/tests extensions/simplebroker_redis/simplebroker_redis extensions/simplebroker_redis/tests

    - name: Type check with mypy
      run: |
        mypy simplebroker bin/release.py extensions/simplebroker_pg/simplebroker_pg extensions/simplebroker_redis/simplebroker_redis extensions/simplebroker_redis/tests --config-file pyproject.toml

  packaging:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
      with:
        python-version: "3.10"

    - name: Install uv
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
      with:
        enable-cache: true
        cache-dependency-glob: |
          pyproject.toml
          uv.lock
          extensions/simplebroker_pg/pyproject.toml
          extensions/simplebroker_pg/uv.lock
          extensions/simplebroker_redis/pyproject.toml
          extensions/simplebroker_redis/uv.lock

    - name: Install build tools
      run: |
        python -m pip install build

    - name: Run packaging smoke
      run: |
        uv run ./bin/packaging-smoke --python 3.10

  coverage:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
      with:
        python-version: "3.12"

    - name: Install uv
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
      with:
        enable-cache: true
        cache-dependency-glob: |
          pyproject.toml
          uv.lock
          extensions/simplebroker_pg/pyproject.toml
          extensions/simplebroker_pg/uv.lock
          extensions/simplebroker_redis/pyproject.toml
          extensions/simplebroker_redis/uv.lock

    - name: Install dependencies
      run: |
        uv pip install --system -e ".[dev]"

    - name: Run tests with coverage
      env:
        PYTEST_ADDOPTS: -ra -q --strict-markers -n auto --dist loadgroup
        COVERAGE_PROCESS_START: ${{ github.workspace }}/pyproject.toml
        COVERAGE_FILE: ${{ github.workspace }}/.coverage
      run: |
        uv run pytest --cov=simplebroker --cov-report=term-missing --cov-report=xml -m "not slow"

    - name: Upload coverage reports
      uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: VanL/simplebroker
